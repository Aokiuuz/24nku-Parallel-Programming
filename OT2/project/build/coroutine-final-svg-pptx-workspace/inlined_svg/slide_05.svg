<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720" role="img" aria-label="事件循环到协程：把性能重新包装成可读代码">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1020"/>
      <stop offset="55%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#172033"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#002FA7"/>
      <stop offset="100%" stop-color="#002FA7"/>
    </linearGradient>
    <style>
      .page { font-family: "Inter", "Helvetica Neue", "Helvetica", "Noto Sans SC", "Microsoft YaHei", "Microsoft YaHei UI", "DengXian", "SimSun", "NSimSun", Arial, sans-serif; }
      .card { fill: rgba(255,255,255,0.78); stroke: #D4D4D2; stroke-width: 1.15; }
      .card2 { fill: rgba(255,255,255,0.88); stroke: #0A0A0A; stroke-width: 1.15; }
      .chartcard { fill: #FFFFFF; stroke: #0A0A0A; stroke-width: 1.15; }
      .kicker { fill: #002FA7; font-size: 14.5px; font-weight: 700; letter-spacing: 1.9px; }
      .title { fill: #0A0A0A; font-size: 39px; font-weight: 560; letter-spacing: 0; }
      .h1 { fill: #0A0A0A; font-size: 52px; font-weight: 360; letter-spacing: 0; }
      .h2 { fill: #0A0A0A; font-size: 24px; font-weight: 560; letter-spacing: 0; }
      .h3 { fill: #0A0A0A; font-size: 19.5px; font-weight: 620; letter-spacing: 0; }
      .body { fill: #242424; font-size: 16.8px; font-weight: 470; letter-spacing: 0; }
      .body2 { fill: #0A0A0A; font-size: 19.2px; font-weight: 560; letter-spacing: 0; }
      .small { fill: #737373; font-size: 13.5px; font-weight: 520; letter-spacing: 0; }
      .metric { fill: #002FA7; font-size: 44px; font-weight: 520; letter-spacing: 0; }
      .axis { stroke: #D4D4D2; stroke-width: 1; }
      .node { fill: rgba(255,255,255,0.82); stroke: #D4D4D2; stroke-width: 1.1; }
      .line { fill: none; stroke-width: 3; stroke-linecap: square; stroke-linejoin: miter; }
    </style>
  </defs>
  <rect class="page" width="1280" height="720" fill="#FAFAF8"/ style="font-family: "Inter", "Helvetica Neue", "Helvetica", "Noto Sans SC", "Microsoft YaHei", "Microsoft YaHei UI", "DengXian", "SimSun", "NSimSun", Arial, sans-serif;">
  <g class="swiss-grid">
  <line x1="80" y1="0" x2="80" y2="720" stroke="#D4D4D2" stroke-width="0.65" opacity="0.35"/>
  <line x1="150" y1="0" x2="150" y2="720" stroke="#D4D4D2" stroke-width="0.65" opacity="0.35"/>
  <line x1="220" y1="0" x2="220" y2="720" stroke="#D4D4D2" stroke-width="0.65" opacity="0.35"/>
  <line x1="290" y1="0" x2="290" y2="720" stroke="#D4D4D2" stroke-width="0.65" opacity="0.35"/>
  <line x1="360" y1="0" x2="360" y2="720" stroke="#D4D4D2" stroke-width="0.65" opacity="0.35"/>
  <line x1="430" y1="0" x2="430" y2="720" stroke="#D4D4D2" stroke-width="0.65" opacity="0.35"/>
  <line x1="500" y1="0" x2="500" y2="720" stroke="#D4D4D2" stroke-width="0.65" opacity="0.35"/>
  <line x1="570" y1="0" x2="570" y2="720" stroke="#D4D4D2" stroke-width="0.65" opacity="0.35"/>
  <line x1="640" y1="0" x2="640" y2="720" stroke="#D4D4D2" stroke-width="0.65" opacity="0.35"/>
  <line x1="710" y1="0" x2="710" y2="720" stroke="#D4D4D2" stroke-width="0.65" opacity="0.35"/>
  <line x1="780" y1="0" x2="780" y2="720" stroke="#D4D4D2" stroke-width="0.65" opacity="0.35"/>
  <line x1="850" y1="0" x2="850" y2="720" stroke="#D4D4D2" stroke-width="0.65" opacity="0.35"/>
  <line x1="920" y1="0" x2="920" y2="720" stroke="#D4D4D2" stroke-width="0.65" opacity="0.35"/>
  <line x1="990" y1="0" x2="990" y2="720" stroke="#D4D4D2" stroke-width="0.65" opacity="0.35"/>
  <line x1="1060" y1="0" x2="1060" y2="720" stroke="#D4D4D2" stroke-width="0.65" opacity="0.35"/>
  <line x1="1130" y1="0" x2="1130" y2="720" stroke="#D4D4D2" stroke-width="0.65" opacity="0.35"/>
  <line x1="1200" y1="0" x2="1200" y2="720" stroke="#D4D4D2" stroke-width="0.65" opacity="0.35"/>
  <line x1="1270" y1="0" x2="1270" y2="720" stroke="#D4D4D2" stroke-width="0.65" opacity="0.35"/>
  <line x1="0" y1="80" x2="1280" y2="80" stroke="#D4D4D2" stroke-width="0.65" opacity="0.22"/>
  <line x1="0" y1="150" x2="1280" y2="150" stroke="#D4D4D2" stroke-width="0.65" opacity="0.22"/>
  <line x1="0" y1="220" x2="1280" y2="220" stroke="#D4D4D2" stroke-width="0.65" opacity="0.22"/>
  <line x1="0" y1="290" x2="1280" y2="290" stroke="#D4D4D2" stroke-width="0.65" opacity="0.22"/>
  <line x1="0" y1="360" x2="1280" y2="360" stroke="#D4D4D2" stroke-width="0.65" opacity="0.22"/>
  <line x1="0" y1="430" x2="1280" y2="430" stroke="#D4D4D2" stroke-width="0.65" opacity="0.22"/>
  <line x1="0" y1="500" x2="1280" y2="500" stroke="#D4D4D2" stroke-width="0.65" opacity="0.22"/>
  <line x1="0" y1="570" x2="1280" y2="570" stroke="#D4D4D2" stroke-width="0.65" opacity="0.22"/>
  <line x1="0" y1="640" x2="1280" y2="640" stroke="#D4D4D2" stroke-width="0.65" opacity="0.22"/>
  <line x1="0" y1="710" x2="1280" y2="710" stroke="#D4D4D2" stroke-width="0.65" opacity="0.22"/>

  </g>
  <g class="page" style="font-family: "Inter", "Helvetica Neue", "Helvetica", "Noto Sans SC", "Microsoft YaHei", "Microsoft YaHei UI", "DengXian", "SimSun", "NSimSun", Arial, sans-serif;">
    <text x="50" y="52" class="kicker" text-anchor="start" style="fill: #002FA7; font-size: 14.5px; font-weight: 700; letter-spacing: 1.9px;">ABSTRACTION</text>
    <text x="50" y="96" class="title" text-anchor="start" style="fill: #0A0A0A; font-size: 39px; font-weight: 560; letter-spacing: 0;">事件循环到协程：把性能重新包装成可读代码</text>
    <text x="50" y="128" class="body" text-anchor="start" style="fill: #242424; font-size: 16.8px; font-weight: 470; letter-spacing: 0;">协程同时服务两个目标：保持事件驱动的资源效率，降低异步代码的状态管理成本。</text>

    <rect x="48" y="166" width="360" height="392" rx="0" class="card"/ style="fill: rgba(255,255,255,0.78); stroke: #D4D4D2; stroke-width: 1.15;"><rect x="48" y="166" width="6" height="392" rx="3" fill="#002FA7" opacity="0.95"/>
    <text x="78" y="210" class="kicker" style="fill: #002FA7; font-size: 14.5px; font-weight: 700; letter-spacing: 1.9px;">THREAD STYLE</text><text x="78" y="250" class="h2" style="fill: #0A0A0A; font-size: 24px; font-weight: 560; letter-spacing: 0;">同步线程式代码</text>
    <circle cx="78" cy="299" r="4.5" fill="#002FA7"/>
<text x="96" y="304" class="body" text-anchor="start" style="fill: #242424; font-size: 16.8px; font-weight: 470; letter-spacing: 0;">调用链直观</text>
<circle cx="78" cy="333" r="4.5" fill="#002FA7"/>
<text x="96" y="338" class="body" text-anchor="start" style="fill: #242424; font-size: 16.8px; font-weight: 470; letter-spacing: 0;">等待也占线程</text>
<circle cx="78" cy="367" r="4.5" fill="#002FA7"/>
<text x="96" y="372" class="body" text-anchor="start" style="fill: #242424; font-size: 16.8px; font-weight: 470; letter-spacing: 0;">高并发资源成本高</text>
    <rect x="78" y="430" width="300" height="72" rx="15" fill="rgba(255,255,255,0.72)"/><text x="104" y="462" class="small" style="fill: #737373; font-size: 13.5px; font-weight: 520; letter-spacing: 0;">data = read()</text><text x="104" y="488" class="small" style="fill: #737373; font-size: 13.5px; font-weight: 520; letter-spacing: 0;">return parse(data)</text>
    <rect x="460" y="166" width="360" height="392" rx="0" class="card"/ style="fill: rgba(255,255,255,0.78); stroke: #D4D4D2; stroke-width: 1.15;"><rect x="460" y="166" width="6" height="392" rx="3" fill="#002FA7" opacity="0.95"/>
    <text x="490" y="210" class="kicker" style="fill: #002FA7; font-size: 14.5px; font-weight: 700; letter-spacing: 1.9px;">EVENT LOOP</text><text x="490" y="250" class="h2" style="fill: #0A0A0A; font-size: 24px; font-weight: 560; letter-spacing: 0;">事件循环回调</text>
    <circle cx="490" cy="299" r="4.5" fill="#002FA7"/>
<text x="508" y="304" class="body" text-anchor="start" style="fill: #242424; font-size: 16.8px; font-weight: 470; letter-spacing: 0;">少线程高吞吐</text>
<circle cx="490" cy="333" r="4.5" fill="#002FA7"/>
<text x="508" y="338" class="body" text-anchor="start" style="fill: #242424; font-size: 16.8px; font-weight: 470; letter-spacing: 0;">回调链复杂</text>
<circle cx="490" cy="367" r="4.5" fill="#002FA7"/>
<text x="508" y="372" class="body" text-anchor="start" style="fill: #242424; font-size: 16.8px; font-weight: 470; letter-spacing: 0;">状态分散</text>
    <rect x="490" y="430" width="300" height="72" rx="15" fill="rgba(255,255,255,0.72)"/><text x="516" y="462" class="small" style="fill: #737373; font-size: 13.5px; font-weight: 520; letter-spacing: 0;">read(on_done)</text><text x="516" y="488" class="small" style="fill: #737373; font-size: 13.5px; font-weight: 520; letter-spacing: 0;">on_done -> parse()</text>
    <rect x="872" y="166" width="360" height="392" rx="0" class="card2"/ style="fill: rgba(255,255,255,0.88); stroke: #0A0A0A; stroke-width: 1.15;"><rect x="872" y="166" width="6" height="392" rx="3" fill="#002FA7" opacity="0.95"/>
    <text x="902" y="210" class="kicker" style="fill: #002FA7; font-size: 14.5px; font-weight: 700; letter-spacing: 1.9px;">COROUTINE</text><text x="902" y="250" class="h2" style="fill: #0A0A0A; font-size: 24px; font-weight: 560; letter-spacing: 0;">async / await 协程</text>
    <circle cx="902" cy="299" r="4.5" fill="#002FA7"/>
<text x="920" y="304" class="body" text-anchor="start" style="fill: #242424; font-size: 16.8px; font-weight: 470; letter-spacing: 0;">等待不独占线程</text>
<circle cx="902" cy="333" r="4.5" fill="#002FA7"/>
<text x="920" y="338" class="body" text-anchor="start" style="fill: #242424; font-size: 16.8px; font-weight: 470; letter-spacing: 0;">代码按流程阅读</text>
<circle cx="902" cy="367" r="4.5" fill="#002FA7"/>
<text x="920" y="372" class="body" text-anchor="start" style="fill: #242424; font-size: 16.8px; font-weight: 470; letter-spacing: 0;">运行时恢复执行</text>
    <rect x="902" y="430" width="300" height="72" rx="15" fill="rgba(0,47,167,0.10)" stroke="#002FA7"/><text x="928" y="462" class="small" style="fill: #737373; font-size: 13.5px; font-weight: 520; letter-spacing: 0;">data = await read()</text><text x="928" y="488" class="small" style="fill: #737373; font-size: 13.5px; font-weight: 520; letter-spacing: 0;">return parse(data)</text>

  </g>
  <text x="1232" y="692" text-anchor="end" class="small" style="fill: #737373; font-size: 13.5px; font-weight: 520; letter-spacing: 0;">05/20</text>
</svg>
