    <text x="1092" y="414" class="body" style="fill: #242424; font-size: 16.8px; font-weight: 470; letter-spacing: 0;">threads-200</text>
    <text x="1006" y="484" class="small" style="fill: #737373; font-size: 13.5px; font-weight: 520; letter-spacing: 0;">结论：线程池可用更多线程换低延迟；协程优势是极低线程成本下承载并发。</text>

