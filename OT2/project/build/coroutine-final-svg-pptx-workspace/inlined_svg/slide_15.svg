    <rect x="976" y="166" width="256" height="392" rx="0" class="card"/ style="fill: rgba(255,255,255,0.78); stroke: #D4D4D2; stroke-width: 1.15;"><rect x="976" y="166" width="6" height="392" rx="3" fill="#002FA7" opacity="0.95"/>
