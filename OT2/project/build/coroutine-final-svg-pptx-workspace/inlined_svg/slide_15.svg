    <text x="50" y="128" class="body" text-anchor="start" style="fill: #242424; font-size: 16.8px; font-weight: 470; letter-spacing: 0;">asyncio用0个业务新增线程稳定承载5000个TCP请求；threads-200更快，但新增约200个线程。</text>

    <rect x="48" y="166" width="900" height="392" rx="0" class="chartcard"/ style="fill: #FFFFFF; stroke: #0A0A0A; stroke-width: 1.15;">
