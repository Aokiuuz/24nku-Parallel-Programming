  <g class="page" style="font-family: "Inter", "Helvetica Neue", "Helvetica", "Noto Sans SC", "Microsoft YaHei", "Microsoft YaHei UI", "DengXian", "SimSun", "NSimSun", Arial, sans-serif;">
    <text x="50" y="52" class="kicker" text-anchor="start" style="fill: #002FA7; font-size: 14.5px; font-weight: 700; letter-spacing: 1.9px;">SYSTEM</text>
    <text x="50" y="96" class="title" text-anchor="start" style="fill: #0A0A0A; font-size: 39px; font-weight: 560; letter-spacing: 0;">编译器、运行时、OS 如何协同</text>
    <text x="50" y="128" class="body" text-anchor="start" style="fill: #242424; font-size: 16.8px; font-weight: 470; letter-spacing: 0;">操作系统调度线程，运行时调度协程；协程没有脱离线程存在。</text>

    <rect x="48" y="166" width="780" height="392" rx="0" class="card2"/ style="fill: rgba(255,255,255,0.88); stroke: #0A0A0A; stroke-width: 1.15;"><rect x="48" y="166" width="6" height="392" rx="3" fill="#002FA7" opacity="0.95"/>
    <text x="82" y="208" class="kicker" style="fill: #002FA7; font-size: 14.5px; font-weight: 700; letter-spacing: 1.9px;">LAYERED ARCHITECTURE</text>
    <g transform="translate(86 248)">
      <rect x="0" y="0" width="680" height="56" rx="16" fill="rgba(0,47,167,0.10)" stroke="#002FA7"/><text x="24" y="36" class="body2" style="fill: #0A0A0A; font-size: 19.2px; font-weight: 560; letter-spacing: 0;">应用代码：async/await · goroutine · virtual thread</text>
      <rect x="0" y="76" width="680" height="56" rx="16" fill="rgba(255,255,255,0.72)" stroke="rgba(255,255,255,0.16)"/><text x="24" y="112" class="body2" style="fill: #0A0A0A; font-size: 19.2px; font-weight: 560; letter-spacing: 0;">语言 / 编译器：协程帧 · 状态机 · continuation</text>
      <rect x="0" y="152" width="680" height="56" rx="16" fill="rgba(0,47,167,0.08)" stroke="#002FA7"/><text x="24" y="188" class="body2" style="fill: #0A0A0A; font-size: 19.2px; font-weight: 560; letter-spacing: 0;">运行时：event loop · scheduler · ready queue</text>
      <rect x="0" y="228" width="680" height="56" rx="16" fill="rgba(0,47,167,0.08)" stroke="#002FA7"/><text x="24" y="264" class="body2" style="fill: #0A0A0A; font-size: 19.2px; font-weight: 560; letter-spacing: 0;">操作系统：OS threads · epoll/kqueue/IOCP · I/O</text>
    </g>
    <rect x="852" y="166" width="380" height="180" rx="0" class="card"/ style="fill: rgba(255,255,255,0.78); stroke: #D4D4D2; stroke-width: 1.15;"><rect x="852" y="166" width="6" height="180" rx="3" fill="#002FA7" opacity="0.95"/>
    <text x="882" y="208" class="kicker" style="fill: #002FA7; font-size: 14.5px; font-weight: 700; letter-spacing: 1.9px;">KEY POINT</text><text x="882" y="252" class="h2" style="fill: #0A0A0A; font-size: 24px; font-weight: 560; letter-spacing: 0;">协程仍运行在线程上</text><text x="882" y="290" class="body" style="fill: #242424; font-size: 16.8px; font-weight: 470; letter-spacing: 0;">区别在于等待时不独占线程。</text>
    <rect x="852" y="366" width="380" height="192" rx="0" class="card"/ style="fill: rgba(255,255,255,0.78); stroke: #D4D4D2; stroke-width: 1.15;"><rect x="852" y="366" width="6" height="192" rx="3" fill="#737373" opacity="0.95"/>
