<text x="900" y="446" class="body" text-anchor="start" style="fill: #242424; font-size: 16.8px; font-weight: 470; letter-spacing: 0;">Linux epoll</text>
<circle cx="882" cy="471" r="4.5" fill="#002FA7"/>
<text x="900" y="476" class="body" text-anchor="start" style="fill: #242424; font-size: 16.8px; font-weight: 470; letter-spacing: 0;">BSD/macOS kqueue</text>
