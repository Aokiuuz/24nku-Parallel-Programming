  <g class="page" style="font-family: "Inter", "Helvetica Neue", "Helvetica", "Noto Sans SC", "Microsoft YaHei", "Microsoft YaHei UI", "DengXian", "SimSun", "NSimSun", Arial, sans-serif;">
    <text x="50" y="52" class="kicker" text-anchor="start" style="fill: #002FA7; font-size: 14.5px; font-weight: 700; letter-spacing: 1.9px;">LANGUAGES II</text>
    <text x="50" y="96" class="title" text-anchor="start" style="fill: #0A0A0A; font-size: 39px; font-weight: 560; letter-spacing: 0;">C# 与 Java：应用异步和虚拟线程的工程路线</text>
    <text x="50" y="128" class="body" text-anchor="start" style="fill: #242424; font-size: 16.8px; font-weight: 470; letter-spacing: 0;">成熟运行时把复杂调度隐藏在 Task 或 Virtual Thread 后面。</text>

    <rect x="48" y="166" width="560" height="392" rx="0" class="card2"/ style="fill: rgba(255,255,255,0.88); stroke: #0A0A0A; stroke-width: 1.15;"><rect x="48" y="166" width="6" height="392" rx="3" fill="#002FA7" opacity="0.95"/>
    <text x="82" y="210" class="kicker" style="fill: #002FA7; font-size: 14.5px; font-weight: 700; letter-spacing: 1.9px;">C# ASYNC/AWAIT</text><text x="82" y="252" class="h2" style="fill: #0A0A0A; font-size: 24px; font-weight: 560; letter-spacing: 0;">围绕 Task 的应用层异步模型</text>
    <circle cx="82" cy="301" r="4.5" fill="#002FA7"/>
<text x="100" y="306" class="body" text-anchor="start" style="fill: #242424; font-size: 16.8px; font-weight: 470; letter-spacing: 0;">编译器生成状态机</text>
<circle cx="82" cy="335" r="4.5" fill="#002FA7"/>
<text x="100" y="340" class="body" text-anchor="start" style="fill: #242424; font-size: 16.8px; font-weight: 470; letter-spacing: 0;">Task / Task&lt;T&gt; 表示异步结果</text>
<circle cx="82" cy="369" r="4.5" fill="#002FA7"/>
<text x="100" y="374" class="body" text-anchor="start" style="fill: #242424; font-size: 16.8px; font-weight: 470; letter-spacing: 0;">生态中 HTTP、DB、UI 等API广泛支持</text>
<circle cx="82" cy="403" r="4.5" fill="#002FA7"/>
<text x="100" y="408" class="body" text-anchor="start" style="fill: #242424; font-size: 16.8px; font-weight: 470; letter-spacing: 0;">避免 .Result / .Wait() 阻塞</text>
    <rect x="648" y="166" width="584" height="392" rx="0" class="card"/ style="fill: rgba(255,255,255,0.78); stroke: #D4D4D2; stroke-width: 1.15;"><rect x="648" y="166" width="6" height="392" rx="3" fill="#002FA7" opacity="0.95"/>
    <text x="682" y="210" class="kicker" style="fill: #002FA7; font-size: 14.5px; font-weight: 700; letter-spacing: 1.9px;">JAVA 21 VIRTUAL THREADS</text><text x="682" y="252" class="h2" style="fill: #0A0A0A; font-size: 24px; font-weight: 560; letter-spacing: 0;">让同步线程式代码重新可扩展</text>
    <circle cx="682" cy="301" r="4.5" fill="#002FA7"/>
<text x="700" y="306" class="body" text-anchor="start" style="fill: #242424; font-size: 16.8px; font-weight: 470; letter-spacing: 0;">JVM调度虚拟线程到平台线程</text>
<circle cx="682" cy="335" r="4.5" fill="#002FA7"/>
<text x="700" y="340" class="body" text-anchor="start" style="fill: #242424; font-size: 16.8px; font-weight: 470; letter-spacing: 0;">阻塞I/O时可卸载承载线程</text>
<circle cx="682" cy="369" r="4.5" fill="#002FA7"/>
<text x="700" y="374" class="body" text-anchor="start" style="fill: #242424; font-size: 16.8px; font-weight: 470; letter-spacing: 0;">迁移传统thread-per-request更容易</text>
<circle cx="682" cy="403" r="4.5" fill="#002FA7"/>
<text x="700" y="408" class="body" text-anchor="start" style="fill: #242424; font-size: 16.8px; font-weight: 470; letter-spacing: 0;">关注pinning与下游资源上限</text>

