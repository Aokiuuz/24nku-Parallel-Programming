  <g class="page" style="font-family: "Inter", "Helvetica Neue", "Helvetica", "Noto Sans SC", "Microsoft YaHei", "Microsoft YaHei UI", "DengXian", "SimSun", "NSimSun", Arial, sans-serif;">
    <text x="50" y="52" class="kicker" text-anchor="start" style="fill: #002FA7; font-size: 14.5px; font-weight: 700; letter-spacing: 1.9px;">EXPERIMENT DESIGN</text>
    <text x="50" y="96" class="title" text-anchor="start" style="fill: #0A0A0A; font-size: 39px; font-weight: 560; letter-spacing: 0;">实验设计：本地真实 TCP I/O + CPU 边界</text>
    <text x="50" y="128" class="body" text-anchor="start" style="fill: #242424; font-size: 16.8px; font-weight: 470; letter-spacing: 0;">主实验采用本地 socket 读写和服务端等待，旧 sleep 模拟仅作为概念补充材料。</text>

    <rect x="48" y="166" width="710" height="392" rx="0" class="card2"/ style="fill: rgba(255,255,255,0.88); stroke: #0A0A0A; stroke-width: 1.15;"><rect x="48" y="166" width="6" height="392" rx="3" fill="#002FA7" opacity="0.95"/>
    <text x="82" y="208" class="kicker" style="fill: #002FA7; font-size: 14.5px; font-weight: 700; letter-spacing: 1.9px;">MATRIX</text>
    <rect x="82" y="238" width="636" height="254" rx="0" fill="rgba(255,255,255,0.72)" stroke="rgba(255,255,255,0.16)"/>
    <text x="112" y="282" class="h3" style="fill: #0A0A0A; font-size: 19.5px; font-weight: 620; letter-spacing: 0;">场景</text><text x="260" y="282" class="h3" style="fill: #0A0A0A; font-size: 19.5px; font-weight: 620; letter-spacing: 0;">asyncio</text><text x="436" y="282" class="h3" style="fill: #0A0A0A; font-size: 19.5px; font-weight: 620; letter-spacing: 0;">threads</text><text x="588" y="282" class="h3" style="fill: #0A0A0A; font-size: 19.5px; font-weight: 620; letter-spacing: 0;">指标</text>
    <line x1="104" y1="304" x2="696" y2="304" class="axis"/ style="stroke: #D4D4D2; stroke-width: 1;">
    <text x="112" y="344" class="body" style="fill: #242424; font-size: 16.8px; font-weight: 470; letter-spacing: 0;">TCP I/O</text><text x="260" y="344" class="small" style="fill: #737373; font-size: 13.5px; font-weight: 520; letter-spacing: 0;">open_connection</text><text x="436" y="344" class="small" style="fill: #737373; font-size: 13.5px; font-weight: 520; letter-spacing: 0;">blocking socket</text><text x="588" y="344" class="small" style="fill: #737373; font-size: 13.5px; font-weight: 520; letter-spacing: 0;">耗时/线程/RSS</text>
    <line x1="104" y1="372" x2="696" y2="372" class="axis"/ style="stroke: #D4D4D2; stroke-width: 1;">
    <text x="112" y="414" class="body" style="fill: #242424; font-size: 16.8px; font-weight: 470; letter-spacing: 0;">CPU 计算</text><text x="260" y="414" class="small" style="fill: #737373; font-size: 13.5px; font-weight: 520; letter-spacing: 0;">coroutine内循环</text><text x="436" y="414" class="small" style="fill: #737373; font-size: 13.5px; font-weight: 520; letter-spacing: 0;">线程池循环</text><text x="588" y="414" class="small" style="fill: #737373; font-size: 13.5px; font-weight: 520; letter-spacing: 0;">归一化耗时</text>
    <text x="82" y="528" class="small" style="fill: #737373; font-size: 13.5px; font-weight: 520; letter-spacing: 0;">TCP server: 127.0.0.1 动态端口；每次请求延迟 0.02s；重复5次。</text>
    <rect x="788" y="166" width="444" height="176" rx="0" class="card"/ style="fill: rgba(255,255,255,0.78); stroke: #D4D4D2; stroke-width: 1.15;"><rect x="788" y="166" width="6" height="176" rx="3" fill="#002FA7" opacity="0.95"/>
    <text x="818" y="208" class="kicker" style="fill: #002FA7; font-size: 14.5px; font-weight: 700; letter-spacing: 1.9px;">PARAMETERS</text><circle cx="818" cy="241" r="4.5" fill="#002FA7"/>
<text x="836" y="246" class="body" text-anchor="start" style="fill: #242424; font-size: 16.8px; font-weight: 470; letter-spacing: 0;">I/O请求数：100 到 5000</text>
<circle cx="818" cy="270" r="4.5" fill="#002FA7"/>
<text x="836" y="275" class="body" text-anchor="start" style="fill: #242424; font-size: 16.8px; font-weight: 470; letter-spacing: 0;">asyncio连接上限：50</text>
<circle cx="818" cy="299" r="4.5" fill="#002FA7"/>
<text x="836" y="304" class="body" text-anchor="start" style="fill: #242424; font-size: 16.8px; font-weight: 470; letter-spacing: 0;">线程池worker：50/100/200</text>
<circle cx="818" cy="328" r="4.5" fill="#002FA7"/>
<text x="836" y="333" class="body" text-anchor="start" style="fill: #242424; font-size: 16.8px; font-weight: 470; letter-spacing: 0;">CPU任务数：50/100/200</text>
    <rect x="788" y="362" width="444" height="196" rx="0" class="card"/ style="fill: rgba(255,255,255,0.78); stroke: #D4D4D2; stroke-width: 1.15;"><rect x="788" y="362" width="6" height="196" rx="3" fill="#002FA7" opacity="0.95"/>
    <text x="818" y="404" class="kicker" style="fill: #002FA7; font-size: 14.5px; font-weight: 700; letter-spacing: 1.9px;">WHY THIS IS BETTER</text><circle cx="818" cy="437" r="4.5" fill="#002FA7"/>
<text x="836" y="442" class="body" text-anchor="start" style="fill: #242424; font-size: 16.8px; font-weight: 470; letter-spacing: 0;">真实 socket 读写</text>
<circle cx="818" cy="466" r="4.5" fill="#002FA7"/>
<text x="836" y="471" class="body" text-anchor="start" style="fill: #242424; font-size: 16.8px; font-weight: 470; letter-spacing: 0;">明细与汇总数据分离</text>
<circle cx="818" cy="495" r="4.5" fill="#002FA7"/>
<text x="836" y="500" class="body" text-anchor="start" style="fill: #242424; font-size: 16.8px; font-weight: 470; letter-spacing: 0;">RSS和线程采样</text>
<circle cx="818" cy="524" r="4.5" fill="#002FA7"/>
<text x="836" y="529" class="body" text-anchor="start" style="fill: #242424; font-size: 16.8px; font-weight: 470; letter-spacing: 0;">旧sleep实验降为补充</text>

  </g>
  <text x="1232" y="692" text-anchor="end" class="small" style="fill: #737373; font-size: 13.5px; font-weight: 520; letter-spacing: 0;">13/20</text>
