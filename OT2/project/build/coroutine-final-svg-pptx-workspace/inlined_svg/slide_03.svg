<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720" role="img" aria-label="高并发服务为什么卡在等待">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1020"/>
      <stop offset="55%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#172033"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#002FA7"/>
      <stop offset="100%" stop-color="#002FA7"/>
    </linearGradient>
    <style>
      .page { font-family: "Inter", "Helvetica Neue", "Helvetica", "Noto Sans SC", "Microsoft YaHei", "Microsoft YaHei UI", "DengXian", "SimSun", "NSimSun", Arial, sans-serif; }
      .card { fill: rgba(255,255,255,0.78); stroke: #D4D4D2; stroke-width: 1.15; }
      .card2 { fill: rgba(255,255,255,0.88); stroke: #0A0A0A; stroke-width: 1.15; }
      .chartcard { fill: #FFFFFF; stroke: #0A0A0A; stroke-width: 1.15; }
      .kicker { fill: #002FA7; font-size: 14.5px; font-weight: 700; letter-spacing: 1.9px; }
      .title { fill: #0A0A0A; font-size: 39px; font-weight: 560; letter-spacing: 0; }
      .h1 { fill: #0A0A0A; font-size: 52px; font-weight: 360; letter-spacing: 0; }
      .h2 { fill: #0A0A0A; font-size: 24px; font-weight: 560; letter-spacing: 0; }
      .h3 { fill: #0A0A0A; font-size: 19.5px; font-weight: 620; letter-spacing: 0; }
      .body { fill: #242424; font-size: 16.8px; font-weight: 470; letter-spacing: 0; }
      .body2 { fill: #0A0A0A; font-size: 19.2px; font-weight: 560; letter-spacing: 0; }
      .small { fill: #737373; font-size: 13.5px; font-weight: 520; letter-spacing: 0; }
      .metric { fill: #002FA7; font-size: 44px; font-weight: 520; letter-spacing: 0; }
      .axis { stroke: #D4D4D2; stroke-width: 1; }
      .node { fill: rgba(255,255,255,0.82); stroke: #D4D4D2; stroke-width: 1.1; }
      .line { fill: none; stroke-width: 3; stroke-linecap: square; stroke-linejoin: miter; }
    </style>
  </defs>
  <rect class="page" width="1280" height="720" fill="#FAFAF8"/ style="font-family: "Inter", "Helvetica Neue", "Helvetica", "Noto Sans SC", "Microsoft YaHei", "Microsoft YaHei UI", "DengXian", "SimSun", "NSimSun", Arial, sans-serif;">
  <g class="swiss-grid">
  <line x1="80" y1="0" x2="80" y2="720" stroke="#D4D4D2" stroke-width="0.65" opacity="0.35"/>
  <line x1="150" y1="0" x2="150" y2="720" stroke="#D4D4D2" stroke-width="0.65" opacity="0.35"/>
  <line x1="220" y1="0" x2="220" y2="720" stroke="#D4D4D2" stroke-width="0.65" opacity="0.35"/>
  <line x1="290" y1="0" x2="290" y2="720" stroke="#D4D4D2" stroke-width="0.65" opacity="0.35"/>
  <line x1="360" y1="0" x2="360" y2="720" stroke="#D4D4D2" stroke-width="0.65" opacity="0.35"/>
  <line x1="430" y1="0" x2="430" y2="720" stroke="#D4D4D2" stroke-width="0.65" opacity="0.35"/>
  <line x1="500" y1="0" x2="500" y2="720" stroke="#D4D4D2" stroke-width="0.65" opacity="0.35"/>
  <line x1="570" y1="0" x2="570" y2="720" stroke="#D4D4D2" stroke-width="0.65" opacity="0.35"/>
  <line x1="640" y1="0" x2="640" y2="720" stroke="#D4D4D2" stroke-width="0.65" opacity="0.35"/>
  <line x1="710" y1="0" x2="710" y2="720" stroke="#D4D4D2" stroke-width="0.65" opacity="0.35"/>
  <line x1="780" y1="0" x2="780" y2="720" stroke="#D4D4D2" stroke-width="0.65" opacity="0.35"/>
  <line x1="850" y1="0" x2="850" y2="720" stroke="#D4D4D2" stroke-width="0.65" opacity="0.35"/>
  <line x1="920" y1="0" x2="920" y2="720" stroke="#D4D4D2" stroke-width="0.65" opacity="0.35"/>
  <line x1="990" y1="0" x2="990" y2="720" stroke="#D4D4D2" stroke-width="0.65" opacity="0.35"/>
  <line x1="1060" y1="0" x2="1060" y2="720" stroke="#D4D4D2" stroke-width="0.65" opacity="0.35"/>
  <line x1="1130" y1="0" x2="1130" y2="720" stroke="#D4D4D2" stroke-width="0.65" opacity="0.35"/>
  <line x1="1200" y1="0" x2="1200" y2="720" stroke="#D4D4D2" stroke-width="0.65" opacity="0.35"/>
  <line x1="1270" y1="0" x2="1270" y2="720" stroke="#D4D4D2" stroke-width="0.65" opacity="0.35"/>
  <line x1="0" y1="80" x2="1280" y2="80" stroke="#D4D4D2" stroke-width="0.65" opacity="0.22"/>
  <line x1="0" y1="150" x2="1280" y2="150" stroke="#D4D4D2" stroke-width="0.65" opacity="0.22"/>
  <line x1="0" y1="220" x2="1280" y2="220" stroke="#D4D4D2" stroke-width="0.65" opacity="0.22"/>
  <line x1="0" y1="290" x2="1280" y2="290" stroke="#D4D4D2" stroke-width="0.65" opacity="0.22"/>
  <line x1="0" y1="360" x2="1280" y2="360" stroke="#D4D4D2" stroke-width="0.65" opacity="0.22"/>
  <line x1="0" y1="430" x2="1280" y2="430" stroke="#D4D4D2" stroke-width="0.65" opacity="0.22"/>
  <line x1="0" y1="500" x2="1280" y2="500" stroke="#D4D4D2" stroke-width="0.65" opacity="0.22"/>
  <line x1="0" y1="570" x2="1280" y2="570" stroke="#D4D4D2" stroke-width="0.65" opacity="0.22"/>
  <line x1="0" y1="640" x2="1280" y2="640" stroke="#D4D4D2" stroke-width="0.65" opacity="0.22"/>
  <line x1="0" y1="710" x2="1280" y2="710" stroke="#D4D4D2" stroke-width="0.65" opacity="0.22"/>

  </g>
  <g class="page" style="font-family: "Inter", "Helvetica Neue", "Helvetica", "Noto Sans SC", "Microsoft YaHei", "Microsoft YaHei UI", "DengXian", "SimSun", "NSimSun", Arial, sans-serif;">
    <text x="50" y="52" class="kicker" text-anchor="start" style="fill: #002FA7; font-size: 14.5px; font-weight: 700; letter-spacing: 1.9px;">PROBLEM</text>
    <text x="50" y="96" class="title" text-anchor="start" style="fill: #0A0A0A; font-size: 39px; font-weight: 560; letter-spacing: 0;">高并发服务为什么卡在等待</text>
    <text x="50" y="128" class="body" text-anchor="start" style="fill: #242424; font-size: 16.8px; font-weight: 470; letter-spacing: 0;">请求常在网络、数据库、RPC、缓存、消息队列、定时器或锁上等待；等待期间线程资源仍被占用。</text>

    <rect x="48" y="158" width="760" height="470" rx="0" class="card2"/ style="fill: rgba(255,255,255,0.88); stroke: #0A0A0A; stroke-width: 1.15;"><rect x="48" y="158" width="6" height="470" rx="3" fill="#002FA7" opacity="0.95"/>
    <text x="82" y="204" class="kicker" style="fill: #002FA7; font-size: 14.5px; font-weight: 700; letter-spacing: 1.9px;">REQUEST LIFECYCLE</text>
    <text x="82" y="244" class="h2" style="fill: #0A0A0A; font-size: 24px; font-weight: 560; letter-spacing: 0;">高并发请求的主要矛盾：短计算片段叠加长外部等待</text>
    <rect x="82" y="276" width="688" height="94" rx="16" fill="rgba(255,255,255,0.72)" stroke="rgba(255,255,255,0.16)"/>
    <text x="108" y="310" class="body" style="fill: #242424; font-size: 16.8px; font-weight: 470; letter-spacing: 0;">报告原文口径：一个请求的大部分时间花在等待外部事件上。</text>
    <text x="108" y="340" class="small" style="fill: #737373; font-size: 13.5px; font-weight: 520; letter-spacing: 0;">阻塞等待期间，线程本身没有执行有意义的计算；线程栈、调度上下文和内核对象仍然存在。</text>
    <g transform="translate(88 420)">
      <rect x="0" y="0" width="96" height="44" rx="11" fill="#002FA7"/><text x="48" y="28" text-anchor="middle" fill="#FFFFFF" font-size="15" font-weight="850">CPU</text>
      <rect x="116" y="0" width="422" height="44" rx="11" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.20)"/><text x="327" y="28" text-anchor="middle" class="small" style="fill: #737373; font-size: 13.5px; font-weight: 520; letter-spacing: 0;">等待 DB / RPC / 网络 / 限流器</text>
      <rect x="558" y="0" width="96" height="44" rx="11" fill="#002FA7"/><text x="606" y="28" text-anchor="middle" fill="#FFFFFF" font-size="15" font-weight="850">CPU</text>
      <text x="0" y="96" class="body" style="fill: #242424; font-size: 16.8px; font-weight: 470; letter-spacing: 0;">线程模型：等待期间仍占一个 OS 线程，资源开销随并发放大</text>
      <text x="0" y="130" class="body" style="fill: #242424; font-size: 16.8px; font-weight: 470; letter-spacing: 0;">协程模型：任务挂起进入运行时队列，线程继续处理其他可运行任务</text>
      <text x="0" y="164" class="small" style="fill: #737373; font-size: 13.5px; font-weight: 520; letter-spacing: 0;">选型判断：先确认瓶颈在等待、连接池、下游容量还是 CPU 计算。</text>
    </g>
    <rect x="832" y="158" width="400" height="220" rx="0" class="card"/ style="fill: rgba(255,255,255,0.78); stroke: #D4D4D2; stroke-width: 1.15;"><rect x="832" y="158" width="6" height="220" rx="3" fill="#002FA7" opacity="0.95"/>
    <text x="862" y="204" class="kicker" style="fill: #002FA7; font-size: 14.5px; font-weight: 700; letter-spacing: 1.9px;">WAIT SOURCES</text>
    <circle cx="862" cy="239" r="4.5" fill="#002FA7"/>
<text x="880" y="244" class="body" text-anchor="start" style="fill: #242424; font-size: 16.8px; font-weight: 470; letter-spacing: 0;">客户端网络包到达</text>
<circle cx="862" cy="269" r="4.5" fill="#002FA7"/>
<text x="880" y="274" class="body" text-anchor="start" style="fill: #242424; font-size: 16.8px; font-weight: 470; letter-spacing: 0;">数据库 / Redis / 消息队列</text>
<circle cx="862" cy="299" r="4.5" fill="#002FA7"/>
<text x="880" y="304" class="body" text-anchor="start" style="fill: #242424; font-size: 16.8px; font-weight: 470; letter-spacing: 0;">RPC 下游响应</text>
<circle cx="862" cy="329" r="4.5" fill="#002FA7"/>
<text x="880" y="334" class="body" text-anchor="start" style="fill: #242424; font-size: 16.8px; font-weight: 470; letter-spacing: 0;">磁盘、对象存储、文件系统</text>
<circle cx="862" cy="359" r="4.5" fill="#002FA7"/>
<text x="880" y="364" class="body" text-anchor="start" style="fill: #242424; font-size: 16.8px; font-weight: 470; letter-spacing: 0;">连接池、限流器、定时器、锁</text>
    <rect x="832" y="398" width="400" height="230" rx="0" class="card"/ style="fill: rgba(255,255,255,0.78); stroke: #D4D4D2; stroke-width: 1.15;"><rect x="832" y="398" width="6" height="230" rx="3" fill="#002FA7" opacity="0.95"/>
    <text x="862" y="444" class="kicker" style="fill: #002FA7; font-size: 14.5px; font-weight: 700; letter-spacing: 1.9px;">WHY IT MATTERS</text>
    <text x="862" y="506" class="metric" style="fill: #002FA7; font-size: 44px; font-weight: 520; letter-spacing: 0;">10K+</text>
    <text x="1000" y="486" class="body" style="fill: #242424; font-size: 16.8px; font-weight: 470; letter-spacing: 0;">连接同时等待时</text>
    <text x="1000" y="516" class="body" style="fill: #242424; font-size: 16.8px; font-weight: 470; letter-spacing: 0;">线程栈、内核对象、调度上下文</text>
    <text x="1000" y="546" class="body" style="fill: #242424; font-size: 16.8px; font-weight: 470; letter-spacing: 0;">会成为系统扩展性的限制项</text>
    <text x="862" y="590" class="small" style="fill: #737373; font-size: 13.5px; font-weight: 520; letter-spacing: 0;">C10K 推动了事件驱动、非阻塞 I/O、异步框架与协程运行时的发展。</text>

  </g>
  <text x="1232" y="692" text-anchor="end" class="small" style="fill: #737373; font-size: 13.5px; font-weight: 520; letter-spacing: 0;">03/20</text>
</svg>
