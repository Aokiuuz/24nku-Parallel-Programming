<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720" role="img" aria-label="实验设计：本地真实 TCP I/O + CPU 边界">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1020"/>
      <stop offset="55%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#172033"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#020617" flood-opacity="0.34"/>
    </filter>
    <style>
      .page { font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif; }
      .card { fill: rgba(255,255,255,0.078); stroke: rgba(255,255,255,0.15); stroke-width: 1.1; }
      .card2 { fill: rgba(255,255,255,0.112); stroke: rgba(255,255,255,0.20); stroke-width: 1.1; }
      .chartcard { fill: rgba(248,250,252,0.97); stroke: rgba(255,255,255,0.12); stroke-width: 1.1; }
      .kicker { fill: #93C5FD; font-size: 12.5px; font-weight: 850; letter-spacing: 1.7px; }
      .title { fill: #F8FAFC; font-size: 35px; font-weight: 850; letter-spacing: 0; }
      .h1 { fill: #F8FAFC; font-size: 52px; font-weight: 850; letter-spacing: 0; }
      .h2 { fill: #F8FAFC; font-size: 22px; font-weight: 820; letter-spacing: 0; }
      .h3 { fill: #E5E7EB; font-size: 18px; font-weight: 780; letter-spacing: 0; }
      .body { fill: #CBD5E1; font-size: 16px; font-weight: 540; letter-spacing: 0; }
      .body2 { fill: #E2E8F0; font-size: 18px; font-weight: 620; letter-spacing: 0; }
      .small { fill: #94A3B8; font-size: 12.5px; font-weight: 520; letter-spacing: 0; }
      .metric { fill: #F8FAFC; font-size: 44px; font-weight: 850; letter-spacing: 0; }
      .axis { stroke: rgba(255,255,255,0.22); stroke-width: 1; }
      .node { fill: rgba(15,23,42,0.75); stroke: rgba(255,255,255,0.18); stroke-width: 1.1; }
      .line { fill: none; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>
  <rect class="page" width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1126" cy="-88" r="282" fill="#2563EB" opacity="0.12"/>
  <circle cx="-86" cy="650" r="310" fill="#059669" opacity="0.10"/>
  <g class="page" filter="url(#shadow)">
    <text x="50" y="52" class="kicker" text-anchor="start">EXPERIMENT DESIGN</text>
    <text x="50" y="96" class="title" text-anchor="start">实验设计：本地真实 TCP I/O + CPU 边界</text>
    <text x="50" y="128" class="body" text-anchor="start">主实验不再只 sleep，而是让请求真实经过 socket 读写和服务端等待。</text>

    <rect x="48" y="166" width="710" height="392" rx="22" class="card2"/><rect x="48" y="166" width="6" height="392" rx="3" fill="#2563EB" opacity="0.95"/>
    <text x="82" y="208" class="kicker">MATRIX</text>
    <rect x="82" y="238" width="636" height="254" rx="18" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.16)"/>
    <text x="112" y="282" class="h3">场景</text><text x="260" y="282" class="h3">asyncio</text><text x="436" y="282" class="h3">threads</text><text x="588" y="282" class="h3">指标</text>
    <line x1="104" y1="304" x2="696" y2="304" class="axis"/>
    <text x="112" y="344" class="body">TCP I/O</text><text x="260" y="344" class="small">open_connection</text><text x="436" y="344" class="small">blocking socket</text><text x="588" y="344" class="small">耗时/线程/RSS</text>
    <line x1="104" y1="372" x2="696" y2="372" class="axis"/>
    <text x="112" y="414" class="body">CPU 计算</text><text x="260" y="414" class="small">coroutine内循环</text><text x="436" y="414" class="small">线程池循环</text><text x="588" y="414" class="small">归一化耗时</text>
    <text x="82" y="528" class="small">TCP server: 127.0.0.1 动态端口；每次请求延迟 0.02s；重复5次。</text>
    <rect x="788" y="166" width="444" height="176" rx="22" class="card"/><rect x="788" y="166" width="6" height="176" rx="3" fill="#059669" opacity="0.95"/>
    <text x="818" y="208" class="kicker">PARAMETERS</text><circle cx="818" cy="241" r="4.5" fill="#60A5FA"/>
<text x="836" y="246" class="body" text-anchor="start">I/O请求数：100 到 5000</text>
<circle cx="818" cy="270" r="4.5" fill="#60A5FA"/>
<text x="836" y="275" class="body" text-anchor="start">asyncio连接上限：50</text>
<circle cx="818" cy="299" r="4.5" fill="#60A5FA"/>
<text x="836" y="304" class="body" text-anchor="start">线程池worker：50/100/200</text>
<circle cx="818" cy="328" r="4.5" fill="#60A5FA"/>
<text x="836" y="333" class="body" text-anchor="start">CPU任务数：50/100/200</text>
    <rect x="788" y="362" width="444" height="196" rx="22" class="card"/><rect x="788" y="362" width="6" height="196" rx="3" fill="#DC2626" opacity="0.95"/>
    <text x="818" y="404" class="kicker">WHY THIS IS BETTER</text><circle cx="818" cy="437" r="4.5" fill="#F87171"/>
<text x="836" y="442" class="body" text-anchor="start">真实 socket 读写</text>
<circle cx="818" cy="466" r="4.5" fill="#F87171"/>
<text x="836" y="471" class="body" text-anchor="start">明细与汇总数据分离</text>
<circle cx="818" cy="495" r="4.5" fill="#F87171"/>
<text x="836" y="500" class="body" text-anchor="start">RSS和线程采样</text>
<circle cx="818" cy="524" r="4.5" fill="#F87171"/>
<text x="836" y="529" class="body" text-anchor="start">旧sleep实验降为补充</text>

  </g>
  <text x="48" y="692" class="small">Coroutine Technology Research · 15-min presentation</text>
  <text x="1232" y="692" text-anchor="end" class="small">12/18</text>
</svg>
