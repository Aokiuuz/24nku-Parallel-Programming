<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720" role="img" aria-label="实验指标解释：主读中位数，补充看均值和范围">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1020"/>
      <stop offset="55%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#172033"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#020617" flood-opacity="0.34"/>
    </filter>
    <style>
      .page { font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif; }
      .card { fill: rgba(255,255,255,0.078); stroke: rgba(255,255,255,0.15); stroke-width: 1.1; }
      .card2 { fill: rgba(255,255,255,0.112); stroke: rgba(255,255,255,0.20); stroke-width: 1.1; }
      .chartcard { fill: rgba(248,250,252,0.97); stroke: rgba(255,255,255,0.12); stroke-width: 1.1; }
      .kicker { fill: #93C5FD; font-size: 12.5px; font-weight: 850; letter-spacing: 1.7px; }
      .title { fill: #F8FAFC; font-size: 35px; font-weight: 850; letter-spacing: 0; }
      .h1 { fill: #F8FAFC; font-size: 52px; font-weight: 850; letter-spacing: 0; }
      .h2 { fill: #F8FAFC; font-size: 22px; font-weight: 820; letter-spacing: 0; }
      .h3 { fill: #E5E7EB; font-size: 18px; font-weight: 780; letter-spacing: 0; }
      .body { fill: #CBD5E1; font-size: 16px; font-weight: 540; letter-spacing: 0; }
      .body2 { fill: #E2E8F0; font-size: 18px; font-weight: 620; letter-spacing: 0; }
      .small { fill: #94A3B8; font-size: 12.5px; font-weight: 520; letter-spacing: 0; }
      .metric { fill: #F8FAFC; font-size: 44px; font-weight: 850; letter-spacing: 0; }
      .axis { stroke: rgba(255,255,255,0.22); stroke-width: 1; }
      .node { fill: rgba(15,23,42,0.75); stroke: rgba(255,255,255,0.18); stroke-width: 1.1; }
      .line { fill: none; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>
  <rect class="page" width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1126" cy="-88" r="282" fill="#2563EB" opacity="0.12"/>
  <circle cx="-86" cy="650" r="310" fill="#059669" opacity="0.10"/>
  <g class="page" filter="url(#shadow)">
    <text x="50" y="52" class="kicker" text-anchor="start">METRICS</text>
    <text x="50" y="96" class="title" text-anchor="start">实验指标解释：主读中位数，补充看均值和范围</text>
    <text x="50" y="128" class="body" text-anchor="start">指标口径先讲清楚，实验结论才不会被误读。</text>

    <rect x="48" y="166" width="370" height="392" rx="22" class="card2"/><rect x="48" y="166" width="6" height="392" rx="3" fill="#2563EB" opacity="0.95"/>
    <text x="82" y="210" class="kicker">TIME</text><text x="82" y="252" class="h2">中位耗时</text><circle cx="82" cy="301" r="4.5" fill="#60A5FA"/>
<text x="100" y="306" class="body" text-anchor="start">每组重复5次</text>
<circle cx="82" cy="335" r="4.5" fill="#60A5FA"/>
<text x="100" y="340" class="body" text-anchor="start">主读median，降低偶然波动</text>
<circle cx="82" cy="369" r="4.5" fill="#60A5FA"/>
<text x="100" y="374" class="body" text-anchor="start">PDF保留mean/min/max</text>
    <rect x="456" y="166" width="370" height="392" rx="22" class="card"/><rect x="456" y="166" width="6" height="392" rx="3" fill="#059669" opacity="0.95"/>
    <text x="490" y="210" class="kicker">RESOURCE</text><text x="490" y="252" class="h2">业务新增线程 + RSS增量</text><circle cx="490" cy="301" r="4.5" fill="#34D399"/>
<text x="508" y="306" class="body" text-anchor="start">线程数扣除server和sampler基线</text>
<circle cx="490" cy="335" r="4.5" fill="#34D399"/>
<text x="508" y="340" class="body" text-anchor="start">RSS来自psutil采样</text>
<circle cx="490" cy="369" r="4.5" fill="#34D399"/>
<text x="508" y="374" class="body" text-anchor="start">tracemalloc仅作为补充</text>
    <rect x="864" y="166" width="368" height="392" rx="22" class="card"/><rect x="864" y="166" width="6" height="392" rx="3" fill="#DC2626" opacity="0.95"/>
    <text x="898" y="210" class="kicker">LIMITATION</text><text x="898" y="252" class="h2">实验边界</text><circle cx="898" cy="301" r="4.5" fill="#F87171"/>
<text x="916" y="306" class="body" text-anchor="start">loopback不等于公网生产环境</text>
<circle cx="898" cy="335" r="4.5" fill="#F87171"/>
<text x="916" y="340" class="body" text-anchor="start">Python结果不能直接推广到Go/Java/C++</text>
<circle cx="898" cy="369" r="4.5" fill="#F87171"/>
<text x="916" y="374" class="body" text-anchor="start">CPU实验受GIL影响</text>
<circle cx="898" cy="403" r="4.5" fill="#F87171"/>
<text x="916" y="408" class="body" text-anchor="start">结论聚焦模型边界</text>

  </g>
  <text x="48" y="692" class="small">Coroutine Technology Research · 15-min presentation</text>
  <text x="1232" y="692" text-anchor="end" class="small">13/18</text>
</svg>
