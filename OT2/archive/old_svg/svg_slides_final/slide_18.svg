<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720" role="img" aria-label="总结：理解协程，就是理解等待如何被重新调度">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1020"/>
      <stop offset="55%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#172033"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#020617" flood-opacity="0.34"/>
    </filter>
    <style>
      .page { font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif; }
      .card { fill: rgba(255,255,255,0.078); stroke: rgba(255,255,255,0.15); stroke-width: 1.1; }
      .card2 { fill: rgba(255,255,255,0.112); stroke: rgba(255,255,255,0.20); stroke-width: 1.1; }
      .chartcard { fill: rgba(248,250,252,0.97); stroke: rgba(255,255,255,0.12); stroke-width: 1.1; }
      .kicker { fill: #93C5FD; font-size: 12.5px; font-weight: 850; letter-spacing: 1.7px; }
      .title { fill: #F8FAFC; font-size: 35px; font-weight: 850; letter-spacing: 0; }
      .h1 { fill: #F8FAFC; font-size: 52px; font-weight: 850; letter-spacing: 0; }
      .h2 { fill: #F8FAFC; font-size: 22px; font-weight: 820; letter-spacing: 0; }
      .h3 { fill: #E5E7EB; font-size: 18px; font-weight: 780; letter-spacing: 0; }
      .body { fill: #CBD5E1; font-size: 16px; font-weight: 540; letter-spacing: 0; }
      .body2 { fill: #E2E8F0; font-size: 18px; font-weight: 620; letter-spacing: 0; }
      .small { fill: #94A3B8; font-size: 12.5px; font-weight: 520; letter-spacing: 0; }
      .metric { fill: #F8FAFC; font-size: 44px; font-weight: 850; letter-spacing: 0; }
      .axis { stroke: rgba(255,255,255,0.22); stroke-width: 1; }
      .node { fill: rgba(15,23,42,0.75); stroke: rgba(255,255,255,0.18); stroke-width: 1.1; }
      .line { fill: none; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>
  <rect class="page" width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1126" cy="-88" r="282" fill="#2563EB" opacity="0.12"/>
  <circle cx="-86" cy="650" r="310" fill="#059669" opacity="0.10"/>
  <g class="page" filter="url(#shadow)">
    <text x="50" y="52" class="kicker" text-anchor="start">FINAL TAKEAWAY</text>
    <text x="50" y="96" class="title" text-anchor="start">总结：理解协程，就是理解等待如何被重新调度</text>
    <text x="50" y="128" class="body" text-anchor="start">PPT讲主线，PDF保留完整调研、实验方法、数据和参考资料。</text>

    <rect x="48" y="166" width="1184" height="392" rx="30" class="card2"/>
    <text x="96" y="238" class="h1">协程不是替代线程</text>
    <text x="96" y="306" class="h1">而是重构等待任务的组织方式</text>
    <g transform="translate(96 382)">
      <rect x="0" y="0" width="220" height="30" rx="15" fill="#2563EB" opacity="0.96"/><text x="110.0" y="20" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="850">价值：降低等待成本</text>
      <rect x="250" y="0" width="240" height="30" rx="15" fill="#059669" opacity="0.96"/><text x="370.0" y="20" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="850">机制：保存状态并恢复</text>
      <rect x="520" y="0" width="240" height="30" rx="15" fill="#DC2626" opacity="0.96"/><text x="640.0" y="20" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="850">边界：不创造CPU算力</text>
    </g>
    <text x="96" y="478" class="body">参考：OpenJDK JEP 444 · Python asyncio · Go Effective Go · Microsoft async/await · C++ coroutines · Linux epoll</text>
    <text x="96" y="516" class="small">AI使用：用于资料搜集、结构梳理、实验脚本审阅与图表生成辅助；结论依据官方文档和本地实验复核。</text>

  </g>
  <text x="48" y="692" class="small">Coroutine Technology Research · 15-min presentation</text>
  <text x="1232" y="692" text-anchor="end" class="small">18/18</text>
</svg>
