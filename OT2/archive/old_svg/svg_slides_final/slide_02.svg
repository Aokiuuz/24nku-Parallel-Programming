<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720" role="img" aria-label="高并发服务为什么卡在等待">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1020"/>
      <stop offset="55%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#172033"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#020617" flood-opacity="0.34"/>
    </filter>
    <style>
      .page { font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif; }
      .card { fill: rgba(255,255,255,0.078); stroke: rgba(255,255,255,0.15); stroke-width: 1.1; }
      .card2 { fill: rgba(255,255,255,0.112); stroke: rgba(255,255,255,0.20); stroke-width: 1.1; }
      .chartcard { fill: rgba(248,250,252,0.97); stroke: rgba(255,255,255,0.12); stroke-width: 1.1; }
      .kicker { fill: #93C5FD; font-size: 12.5px; font-weight: 850; letter-spacing: 1.7px; }
      .title { fill: #F8FAFC; font-size: 35px; font-weight: 850; letter-spacing: 0; }
      .h1 { fill: #F8FAFC; font-size: 52px; font-weight: 850; letter-spacing: 0; }
      .h2 { fill: #F8FAFC; font-size: 22px; font-weight: 820; letter-spacing: 0; }
      .h3 { fill: #E5E7EB; font-size: 18px; font-weight: 780; letter-spacing: 0; }
      .body { fill: #CBD5E1; font-size: 16px; font-weight: 540; letter-spacing: 0; }
      .body2 { fill: #E2E8F0; font-size: 18px; font-weight: 620; letter-spacing: 0; }
      .small { fill: #94A3B8; font-size: 12.5px; font-weight: 520; letter-spacing: 0; }
      .metric { fill: #F8FAFC; font-size: 44px; font-weight: 850; letter-spacing: 0; }
      .axis { stroke: rgba(255,255,255,0.22); stroke-width: 1; }
      .node { fill: rgba(15,23,42,0.75); stroke: rgba(255,255,255,0.18); stroke-width: 1.1; }
      .line { fill: none; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>
  <rect class="page" width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1126" cy="-88" r="282" fill="#2563EB" opacity="0.12"/>
  <circle cx="-86" cy="650" r="310" fill="#059669" opacity="0.10"/>
  <g class="page" filter="url(#shadow)">
    <text x="50" y="52" class="kicker" text-anchor="start">PROBLEM</text>
    <text x="50" y="96" class="title" text-anchor="start">高并发服务为什么卡在等待</text>
    <text x="50" y="128" class="body" text-anchor="start">云服务中大量请求处于网络、数据库、RPC 或定时器等待状态。</text>

    <rect x="48" y="166" width="724" height="392" rx="22" class="card2"/><rect x="48" y="166" width="6" height="392" rx="3" fill="#2563EB" opacity="0.95"/>
    <text x="82" y="210" class="kicker">REQUEST LIFECYCLE</text>
    <text x="82" y="248" class="h2">计算很短，等待很长：线程被占住但 CPU 没被充分使用</text>
    <g transform="translate(88 320)">
      <rect x="0" y="0" width="96" height="42" rx="11" fill="#2563EB"/><text x="48" y="27" text-anchor="middle" fill="#fff" font-size="14" font-weight="800">CPU</text>
      <rect x="116" y="0" width="408" height="42" rx="11" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.20)"/><text x="320" y="27" text-anchor="middle" class="small">等待 DB / RPC / 网络</text>
      <rect x="544" y="0" width="84" height="42" rx="11" fill="#2563EB"/><text x="586" y="27" text-anchor="middle" fill="#fff" font-size="14" font-weight="800">CPU</text>
      <text x="0" y="112" class="body">线程模型：等待期间仍占一个 OS 线程</text>
      <text x="0" y="146" class="body">协程模型：挂起任务，线程继续执行其他可运行任务</text>
    </g>
    <rect x="792" y="166" width="440" height="182" rx="22" class="card"/><rect x="792" y="166" width="6" height="182" rx="3" fill="#059669" opacity="0.95"/>
    <text x="824" y="208" class="kicker">WAIT SOURCES</text>
    <circle cx="824" cy="241" r="4.5" fill="#60A5FA"/>
<text x="842" y="246" class="body" text-anchor="start">网络包到达</text>
<circle cx="824" cy="271" r="4.5" fill="#60A5FA"/>
<text x="842" y="276" class="body" text-anchor="start">数据库 / Redis / 消息队列</text>
<circle cx="824" cy="301" r="4.5" fill="#60A5FA"/>
<text x="842" y="306" class="body" text-anchor="start">RPC 下游响应</text>
<circle cx="824" cy="331" r="4.5" fill="#60A5FA"/>
<text x="842" y="336" class="body" text-anchor="start">定时器、连接池、限流器</text>
    <rect x="792" y="368" width="440" height="190" rx="22" class="card"/><rect x="792" y="368" width="6" height="190" rx="3" fill="#DC2626" opacity="0.95"/>
    <text x="824" y="410" class="kicker">WHY IT MATTERS</text>
    <text x="824" y="458" class="metric">10K+</text>
    <text x="958" y="448" class="body">连接同时等待时</text>
    <text x="958" y="476" class="body">线程栈、调度和上下文切换会放大成本</text>

  </g>
  <text x="48" y="692" class="small">Coroutine Technology Research · 15-min presentation</text>
  <text x="1232" y="692" text-anchor="end" class="small">02/18</text>
</svg>
