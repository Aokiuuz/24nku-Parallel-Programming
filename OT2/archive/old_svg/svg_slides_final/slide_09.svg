<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720" role="img" aria-label="主流语言走向两条降低异步复杂度的路线">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1020"/>
      <stop offset="55%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#172033"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#020617" flood-opacity="0.34"/>
    </filter>
    <style>
      .page { font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif; }
      .card { fill: rgba(255,255,255,0.078); stroke: rgba(255,255,255,0.15); stroke-width: 1.1; }
      .card2 { fill: rgba(255,255,255,0.112); stroke: rgba(255,255,255,0.20); stroke-width: 1.1; }
      .chartcard { fill: rgba(248,250,252,0.97); stroke: rgba(255,255,255,0.12); stroke-width: 1.1; }
      .kicker { fill: #93C5FD; font-size: 12.5px; font-weight: 850; letter-spacing: 1.7px; }
      .title { fill: #F8FAFC; font-size: 35px; font-weight: 850; letter-spacing: 0; }
      .h1 { fill: #F8FAFC; font-size: 52px; font-weight: 850; letter-spacing: 0; }
      .h2 { fill: #F8FAFC; font-size: 22px; font-weight: 820; letter-spacing: 0; }
      .h3 { fill: #E5E7EB; font-size: 18px; font-weight: 780; letter-spacing: 0; }
      .body { fill: #CBD5E1; font-size: 16px; font-weight: 540; letter-spacing: 0; }
      .body2 { fill: #E2E8F0; font-size: 18px; font-weight: 620; letter-spacing: 0; }
      .small { fill: #94A3B8; font-size: 12.5px; font-weight: 520; letter-spacing: 0; }
      .metric { fill: #F8FAFC; font-size: 44px; font-weight: 850; letter-spacing: 0; }
      .axis { stroke: rgba(255,255,255,0.22); stroke-width: 1; }
      .node { fill: rgba(15,23,42,0.75); stroke: rgba(255,255,255,0.18); stroke-width: 1.1; }
      .line { fill: none; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>
  <rect class="page" width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1126" cy="-88" r="282" fill="#2563EB" opacity="0.12"/>
  <circle cx="-86" cy="650" r="310" fill="#059669" opacity="0.10"/>
  <g class="page" filter="url(#shadow)">
    <text x="50" y="52" class="kicker" text-anchor="start">LANGUAGE ROUTES</text>
    <text x="50" y="96" class="title" text-anchor="start">主流语言走向两条降低异步复杂度的路线</text>
    <text x="50" y="128" class="body" text-anchor="start">显式 async/await 与轻量线程化并存，目标都是降低等待成本。</text>

    <rect x="48" y="166" width="548" height="392" rx="22" class="card2"/><rect x="48" y="166" width="6" height="392" rx="3" fill="#2563EB" opacity="0.95"/>
    <text x="82" y="210" class="kicker">ROUTE A</text><text x="82" y="252" class="h2">显式 async / await</text>
    <text x="82" y="294" class="body">代表：Python、C#、C++ coroutine 生态</text>
    <circle cx="82" cy="337" r="4.5" fill="#60A5FA"/>
<text x="100" y="342" class="body" text-anchor="start">调用链显式异步</text>
<circle cx="82" cy="369" r="4.5" fill="#60A5FA"/>
<text x="100" y="374" class="body" text-anchor="start">编译器/解释器生成状态机</text>
<circle cx="82" cy="401" r="4.5" fill="#60A5FA"/>
<text x="100" y="406" class="body" text-anchor="start">适合 I/O API 已异步化的生态</text>
<circle cx="82" cy="433" r="4.5" fill="#60A5FA"/>
<text x="100" y="438" class="body" text-anchor="start">风险：阻塞调用破坏调度</text>
    <rect x="636" y="166" width="596" height="392" rx="22" class="card"/><rect x="636" y="166" width="6" height="392" rx="3" fill="#7C3AED" opacity="0.95"/>
    <text x="670" y="210" class="kicker">ROUTE B</text><text x="670" y="252" class="h2">轻量线程化抽象</text>
    <text x="670" y="294" class="body">代表：Go goroutine、Java 21 Virtual Threads</text>
    <circle cx="670" cy="337" r="4.5" fill="#C4B5FD"/>
<text x="688" y="342" class="body" text-anchor="start">更接近“一任务一执行单元”的心智</text>
<circle cx="670" cy="369" r="4.5" fill="#C4B5FD"/>
<text x="688" y="374" class="body" text-anchor="start">运行时把轻量任务映射到 OS 线程</text>
<circle cx="670" cy="401" r="4.5" fill="#C4B5FD"/>
<text x="688" y="406" class="body" text-anchor="start">传统同步代码迁移成本更低</text>
<circle cx="670" cy="433" r="4.5" fill="#C4B5FD"/>
<text x="688" y="438" class="body" text-anchor="start">边界：CPU密集、pinning、下游容量</text>

  </g>
  <text x="48" y="692" class="small">Coroutine Technology Research · 15-min presentation</text>
  <text x="1232" y="692" text-anchor="end" class="small">09/18</text>
</svg>
