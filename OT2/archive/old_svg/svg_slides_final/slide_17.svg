<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720" role="img" aria-label="工程选型：先判断瓶颈，再选择模型">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1020"/>
      <stop offset="55%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#172033"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#020617" flood-opacity="0.34"/>
    </filter>
    <style>
      .page { font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif; }
      .card { fill: rgba(255,255,255,0.078); stroke: rgba(255,255,255,0.15); stroke-width: 1.1; }
      .card2 { fill: rgba(255,255,255,0.112); stroke: rgba(255,255,255,0.20); stroke-width: 1.1; }
      .chartcard { fill: rgba(248,250,252,0.97); stroke: rgba(255,255,255,0.12); stroke-width: 1.1; }
      .kicker { fill: #93C5FD; font-size: 12.5px; font-weight: 850; letter-spacing: 1.7px; }
      .title { fill: #F8FAFC; font-size: 35px; font-weight: 850; letter-spacing: 0; }
      .h1 { fill: #F8FAFC; font-size: 52px; font-weight: 850; letter-spacing: 0; }
      .h2 { fill: #F8FAFC; font-size: 22px; font-weight: 820; letter-spacing: 0; }
      .h3 { fill: #E5E7EB; font-size: 18px; font-weight: 780; letter-spacing: 0; }
      .body { fill: #CBD5E1; font-size: 16px; font-weight: 540; letter-spacing: 0; }
      .body2 { fill: #E2E8F0; font-size: 18px; font-weight: 620; letter-spacing: 0; }
      .small { fill: #94A3B8; font-size: 12.5px; font-weight: 520; letter-spacing: 0; }
      .metric { fill: #F8FAFC; font-size: 44px; font-weight: 850; letter-spacing: 0; }
      .axis { stroke: rgba(255,255,255,0.22); stroke-width: 1; }
      .node { fill: rgba(15,23,42,0.75); stroke: rgba(255,255,255,0.18); stroke-width: 1.1; }
      .line { fill: none; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>
  <rect class="page" width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1126" cy="-88" r="282" fill="#2563EB" opacity="0.12"/>
  <circle cx="-86" cy="650" r="310" fill="#059669" opacity="0.10"/>
  <g class="page" filter="url(#shadow)">
    <text x="50" y="52" class="kicker" text-anchor="start">ENGINEERING RULES</text>
    <text x="50" y="96" class="title" text-anchor="start">工程选型：先判断瓶颈，再选择模型</text>
    <text x="50" y="128" class="body" text-anchor="start">协程是工程工具，不是性能魔法。</text>

    <rect x="48" y="166" width="560" height="392" rx="22" class="card2"/><rect x="48" y="166" width="6" height="392" rx="3" fill="#2563EB" opacity="0.95"/>
    <text x="82" y="208" class="kicker">DECISION TREE</text>
    <g transform="translate(96 252)">
      <rect x="0" y="0" width="460" height="56" rx="16" class="node"/><text x="230" y="36" text-anchor="middle" class="body2">瓶颈是否主要来自 I/O 等待？</text>
      <path d="M230 58 L230 92" class="line" stroke="#64748B"/>
      <rect x="-4" y="96" width="220" height="64" rx="16" fill="rgba(37,99,235,0.24)" stroke="rgba(96,165,250,0.35)"/><text x="106" y="136" text-anchor="middle" class="body">是：协程 / 异步I/O</text>
      <rect x="244" y="96" width="220" height="64" rx="16" fill="rgba(220,38,38,0.20)" stroke="rgba(248,113,113,0.35)"/><text x="354" y="136" text-anchor="middle" class="body">否：并行计算方案</text>
      <path d="M106 162 L106 196" class="line" stroke="#64748B"/><rect x="-4" y="200" width="220" height="64" rx="16" fill="rgba(5,150,105,0.22)" stroke="rgba(52,211,153,0.35)"/><text x="106" y="240" text-anchor="middle" class="body">加超时、限流、取消</text>
    </g>
    <rect x="632" y="166" width="284" height="392" rx="22" class="card"/><rect x="632" y="166" width="6" height="392" rx="3" fill="#059669" opacity="0.95"/>
    <text x="662" y="208" class="kicker">USE WHEN</text><circle cx="662" cy="245" r="4.5" fill="#34D399"/>
<text x="680" y="250" class="body" text-anchor="start">高并发Web服务</text>
<circle cx="662" cy="279" r="4.5" fill="#34D399"/>
<text x="680" y="284" class="body" text-anchor="start">RPC/API聚合</text>
<circle cx="662" cy="313" r="4.5" fill="#34D399"/>
<text x="680" y="318" class="body" text-anchor="start">爬虫与批量请求</text>
<circle cx="662" cy="347" r="4.5" fill="#34D399"/>
<text x="680" y="352" class="body" text-anchor="start">数据库与缓存访问</text>
<circle cx="662" cy="381" r="4.5" fill="#34D399"/>
<text x="680" y="386" class="body" text-anchor="start">长连接与定时器</text>
    <rect x="948" y="166" width="284" height="392" rx="22" class="card"/><rect x="948" y="166" width="6" height="392" rx="3" fill="#DC2626" opacity="0.95"/>
    <text x="978" y="208" class="kicker">AVOID WHEN</text><circle cx="978" cy="245" r="4.5" fill="#F87171"/>
<text x="996" y="250" class="body" text-anchor="start">纯CPU计算</text>
<circle cx="978" cy="279" r="4.5" fill="#F87171"/>
<text x="996" y="284" class="body" text-anchor="start">大量阻塞库</text>
<circle cx="978" cy="313" r="4.5" fill="#F87171"/>
<text x="996" y="318" class="body" text-anchor="start">强实时调度</text>
<circle cx="978" cy="347" r="4.5" fill="#F87171"/>
<text x="996" y="352" class="body" text-anchor="start">无界任务创建</text>
<circle cx="978" cy="381" r="4.5" fill="#F87171"/>
<text x="996" y="386" class="body" text-anchor="start">缺少下游限流</text>

  </g>
  <text x="48" y="692" class="small">Coroutine Technology Research · 15-min presentation</text>
  <text x="1232" y="692" text-anchor="end" class="small">17/18</text>
</svg>
