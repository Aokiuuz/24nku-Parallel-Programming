<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720" role="img" aria-label="C++、Go、Python：从底层机制到显式事件循环">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1020"/>
      <stop offset="55%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#172033"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#020617" flood-opacity="0.34"/>
    </filter>
    <style>
      .page { font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif; }
      .card { fill: rgba(255,255,255,0.078); stroke: rgba(255,255,255,0.15); stroke-width: 1.1; }
      .card2 { fill: rgba(255,255,255,0.112); stroke: rgba(255,255,255,0.20); stroke-width: 1.1; }
      .chartcard { fill: rgba(248,250,252,0.97); stroke: rgba(255,255,255,0.12); stroke-width: 1.1; }
      .kicker { fill: #93C5FD; font-size: 12.5px; font-weight: 850; letter-spacing: 1.7px; }
      .title { fill: #F8FAFC; font-size: 35px; font-weight: 850; letter-spacing: 0; }
      .h1 { fill: #F8FAFC; font-size: 52px; font-weight: 850; letter-spacing: 0; }
      .h2 { fill: #F8FAFC; font-size: 22px; font-weight: 820; letter-spacing: 0; }
      .h3 { fill: #E5E7EB; font-size: 18px; font-weight: 780; letter-spacing: 0; }
      .body { fill: #CBD5E1; font-size: 16px; font-weight: 540; letter-spacing: 0; }
      .body2 { fill: #E2E8F0; font-size: 18px; font-weight: 620; letter-spacing: 0; }
      .small { fill: #94A3B8; font-size: 12.5px; font-weight: 520; letter-spacing: 0; }
      .metric { fill: #F8FAFC; font-size: 44px; font-weight: 850; letter-spacing: 0; }
      .axis { stroke: rgba(255,255,255,0.22); stroke-width: 1; }
      .node { fill: rgba(15,23,42,0.75); stroke: rgba(255,255,255,0.18); stroke-width: 1.1; }
      .line { fill: none; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>
  <rect class="page" width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1126" cy="-88" r="282" fill="#2563EB" opacity="0.12"/>
  <circle cx="-86" cy="650" r="310" fill="#059669" opacity="0.10"/>
  <g class="page" filter="url(#shadow)">
    <text x="50" y="52" class="kicker" text-anchor="start">LANGUAGES I</text>
    <text x="50" y="96" class="title" text-anchor="start">C++、Go、Python：从底层机制到显式事件循环</text>
    <text x="50" y="128" class="body" text-anchor="start">同样处理轻量并发，抽象层级和工程心智完全不同。</text>

    <rect x="48" y="166" width="360" height="392" rx="22" class="card"/><rect x="48" y="166" width="6" height="392" rx="3" fill="#64748B" opacity="0.95"/>
    <text x="78" y="210" class="kicker">C++20</text><text x="78" y="252" class="h2">底层机制</text><circle cx="78" cy="299" r="4.5" fill="#60A5FA"/>
<text x="96" y="304" class="body" text-anchor="start">co_await / co_yield / co_return</text>
<circle cx="78" cy="333" r="4.5" fill="#60A5FA"/>
<text x="96" y="338" class="body" text-anchor="start">标准提供基础设施</text>
<circle cx="78" cy="367" r="4.5" fill="#60A5FA"/>
<text x="96" y="372" class="body" text-anchor="start">运行时与调度依赖库</text>
<circle cx="78" cy="401" r="4.5" fill="#60A5FA"/>
<text x="96" y="406" class="body" text-anchor="start">适合高性能系统框架</text>
    <rect x="460" y="166" width="360" height="392" rx="22" class="card2"/><rect x="460" y="166" width="6" height="392" rx="3" fill="#059669" opacity="0.95"/>
    <text x="490" y="210" class="kicker">GO</text><text x="490" y="252" class="h2">默认并发工具</text><circle cx="490" cy="299" r="4.5" fill="#34D399"/>
<text x="508" y="304" class="body" text-anchor="start">go f() 启动 goroutine</text>
<circle cx="490" cy="333" r="4.5" fill="#34D399"/>
<text x="508" y="338" class="body" text-anchor="start">runtime 使用 M/P/G 调度</text>
<circle cx="490" cy="367" r="4.5" fill="#34D399"/>
<text x="508" y="372" class="body" text-anchor="start">channel 与 context 协作</text>
<circle cx="490" cy="401" r="4.5" fill="#34D399"/>
<text x="508" y="406" class="body" text-anchor="start">适合服务端高并发</text>
    <rect x="872" y="166" width="360" height="392" rx="22" class="card"/><rect x="872" y="166" width="6" height="392" rx="3" fill="#2563EB" opacity="0.95"/>
    <text x="902" y="210" class="kicker">PYTHON</text><text x="902" y="252" class="h2">显式事件循环</text><circle cx="902" cy="299" r="4.5" fill="#60A5FA"/>
<text x="920" y="304" class="body" text-anchor="start">async def / await</text>
<circle cx="902" cy="333" r="4.5" fill="#60A5FA"/>
<text x="920" y="338" class="body" text-anchor="start">Task 排入 event loop</text>
<circle cx="902" cy="367" r="4.5" fill="#60A5FA"/>
<text x="920" y="372" class="body" text-anchor="start">TaskGroup 支持结构化并发</text>
<circle cx="902" cy="401" r="4.5" fill="#60A5FA"/>
<text x="920" y="406" class="body" text-anchor="start">阻塞调用会卡住事件循环</text>

  </g>
  <text x="48" y="692" class="small">Coroutine Technology Research · 15-min presentation</text>
  <text x="1232" y="692" text-anchor="end" class="small">10/18</text>
