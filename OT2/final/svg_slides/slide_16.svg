<text x="882.0" y="480" text-anchor="middle" fill="#111827" font-size="11">5000</text>
<line x1="164" y1="278" x2="188" y2="278" stroke="#2563EB" stroke-width="4" stroke-linecap="round"/>
<circle cx="176" cy="278" r="4" fill="#2563EB"/>
<text x="200" y="283" fill="#111827" font-size="12">asyncio</text>
