  <rect class="page" width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1126" cy="-88" r="282" fill="#2563EB" opacity="0.12"/>
  <circle cx="-86" cy="650" r="310" fill="#059669" opacity="0.10"/>
  <g class="page">
    <text x="50" y="52" class="kicker" text-anchor="start">FINAL TAKEAWAY</text>
    <text x="50" y="96" class="title" text-anchor="start">总结：协程是等待任务的调度抽象，CPU计算依赖并行方案</text>
    <text x="50" y="128" class="body" text-anchor="start">PPT讲结论链路，PDF保留完整调研、实验方法、数据解释、局限性与参考资料。</text>

    <rect x="48" y="158" width="376" height="426" rx="22" class="card2"/><rect x="48" y="158" width="6" height="426" rx="3" fill="#2563EB" opacity="0.95"/>
    <text x="82" y="208" class="kicker">WHAT WE PROVED</text>
    <text x="82" y="250" class="h2">实验结论</text>
    <circle cx="82" cy="295" r="4.5" fill="#60A5FA"/>
<text x="100" y="300" class="body" text-anchor="start">TCP I/O：asyncio 新增线程 0</text>
<circle cx="82" cy="326" r="4.5" fill="#60A5FA"/>
<text x="100" y="331" class="body" text-anchor="start">threads-200：约200线程换低耗时</text>
<circle cx="82" cy="357" r="4.5" fill="#60A5FA"/>
<text x="100" y="362" class="body" text-anchor="start">CPU-bound：耗时接近，需并行方案</text>
<circle cx="82" cy="388" r="4.5" fill="#60A5FA"/>
<text x="100" y="393" class="body" text-anchor="start">主读 median，PDF 保留范围</text>
    <rect x="456" y="158" width="376" height="426" rx="22" class="card"/><rect x="456" y="158" width="6" height="426" rx="3" fill="#059669" opacity="0.95"/>
