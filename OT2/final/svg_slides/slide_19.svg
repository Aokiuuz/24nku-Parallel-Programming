    <circle cx="490" cy="295" r="4.5" fill="#34D399"/>
<text x="508" y="300" class="body" text-anchor="start">I/O 等待多：优先考虑协程/异步I/O</text>
<circle cx="490" cy="326" r="4.5" fill="#34D399"/>
<text x="508" y="331" class="body" text-anchor="start">阻塞库多：先处理同步调用和连接池</text>
<circle cx="490" cy="357" r="4.5" fill="#34D399"/>
<text x="508" y="362" class="body" text-anchor="start">CPU 密集：进程池、原生扩展或向量化</text>
<circle cx="490" cy="388" r="4.5" fill="#34D399"/>
<text x="508" y="393" class="body" text-anchor="start">任何模型都不能替代限流、超时和取消</text>
    <rect x="864" y="158" width="368" height="426" rx="22" class="card"/><rect x="864" y="158" width="6" height="426" rx="3" fill="#64748B" opacity="0.95"/>
    <text x="898" y="208" class="kicker">DELIVERABLES</text>
