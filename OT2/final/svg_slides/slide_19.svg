    <circle cx="898" cy="295" r="4.5" fill="#94A3B8"/>
<text x="916" y="300" class="body" text-anchor="start">20页课堂汇报PPT</text>
<circle cx="898" cy="326" r="4.5" fill="#94A3B8"/>
<text x="916" y="331" class="body" text-anchor="start">20页SVG设计源</text>
<circle cx="898" cy="357" r="4.5" fill="#94A3B8"/>
