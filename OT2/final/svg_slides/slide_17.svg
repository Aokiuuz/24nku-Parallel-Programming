<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720" role="img" aria-label="CPU结果：算力瓶颈需要并行计算方案">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1020"/>
      <stop offset="55%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#172033"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <style>
      .page { font-family: "Microsoft YaHei", "Microsoft YaHei UI", "DengXian", "SimSun", "NSimSun", "Segoe UI", Arial, sans-serif; }
      .card { fill: rgba(255,255,255,0.078); stroke: rgba(255,255,255,0.15); stroke-width: 1.1; }
      .card2 { fill: rgba(255,255,255,0.112); stroke: rgba(255,255,255,0.20); stroke-width: 1.1; }
      .chartcard { fill: rgba(248,250,252,0.97); stroke: rgba(255,255,255,0.12); stroke-width: 1.1; }
      .kicker { fill: #93C5FD; font-size: 14.5px; font-weight: 850; letter-spacing: 1.7px; }
      .title { fill: #F8FAFC; font-size: 39px; font-weight: 850; letter-spacing: 0; }
      .h1 { fill: #F8FAFC; font-size: 52px; font-weight: 850; letter-spacing: 0; }
      .h2 { fill: #F8FAFC; font-size: 24px; font-weight: 820; letter-spacing: 0; }
      .h3 { fill: #E5E7EB; font-size: 19.5px; font-weight: 780; letter-spacing: 0; }
      .body { fill: #CBD5E1; font-size: 16.8px; font-weight: 540; letter-spacing: 0; }
      .body2 { fill: #E2E8F0; font-size: 19.2px; font-weight: 620; letter-spacing: 0; }
      .small { fill: #94A3B8; font-size: 13.5px; font-weight: 520; letter-spacing: 0; }
      .metric { fill: #F8FAFC; font-size: 44px; font-weight: 850; letter-spacing: 0; }
      .axis { stroke: rgba(255,255,255,0.22); stroke-width: 1; }
      .node { fill: rgba(15,23,42,0.75); stroke: rgba(255,255,255,0.18); stroke-width: 1.1; }
      .line { fill: none; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>
  <rect class="page" width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1126" cy="-88" r="282" fill="#2563EB" opacity="0.12"/>
  <circle cx="-86" cy="650" r="310" fill="#059669" opacity="0.10"/>
  <g class="page">
    <text x="50" y="52" class="kicker" text-anchor="start">CPU RESULT</text>
    <text x="50" y="96" class="title" text-anchor="start">CPU结果：算力瓶颈需要并行计算方案</text>
    <text x="50" y="128" class="body" text-anchor="start">CPU-bound 场景下，各模型归一化耗时接近；协程主要负责组织等待任务。</text>

    <rect x="48" y="166" width="900" height="392" rx="22" class="chartcard"/>
    <text x="120" y="222" fill="#111827" font-size="21" font-weight="850">200 CPU tasks: coroutine does not create CPU parallelism</text>
<line x1="152" y1="458" x2="888" y2="458" stroke="#111827" stroke-width="1.2"/>
<line x1="152" y1="260" x2="152" y2="458" stroke="#111827" stroke-width="1.2"/>
<text x="90" y="416" transform="rotate(-90 90 416)" fill="#111827" font-size="14">Normalized duration (asyncio = 1.0)</text>
<line x1="152" y1="458.0" x2="888" y2="458.0" stroke="#E5E7EB" stroke-width="1"/>
<text x="140" y="463.0" text-anchor="end" fill="#111827" font-size="12">0.0</text>
<line x1="152" y1="422.0" x2="888" y2="422.0" stroke="#E5E7EB" stroke-width="1"/>
<text x="140" y="427.0" text-anchor="end" fill="#111827" font-size="12">0.2</text>
<line x1="152" y1="386.0" x2="888" y2="386.0" stroke="#E5E7EB" stroke-width="1"/>
<text x="140" y="391.0" text-anchor="end" fill="#111827" font-size="12">0.4</text>
<line x1="152" y1="350.0" x2="888" y2="350.0" stroke="#E5E7EB" stroke-width="1"/>
<text x="140" y="355.0" text-anchor="end" fill="#111827" font-size="12">0.6</text>
<line x1="152" y1="314.0" x2="888" y2="314.0" stroke="#E5E7EB" stroke-width="1"/>
<text x="140" y="319.0" text-anchor="end" fill="#111827" font-size="12">0.8</text>
<line x1="152" y1="278.0" x2="888" y2="278.0" stroke="#E5E7EB" stroke-width="1"/>
<text x="140" y="283.0" text-anchor="end" fill="#111827" font-size="12">1.0</text>
<rect x="186.0" y="278.0" width="116" height="180.0" rx="3" fill="#2563EB"/>
<text x="244.0" y="270.0" text-anchor="middle" fill="#111827" font-size="12">1.00×</text>
<text x="244.0" y="484" text-anchor="middle" fill="#111827" font-size="12">asyncio</text>
<rect x="370.0" y="285.4" width="116" height="172.6" rx="3" fill="#CBD5E1"/>
<text x="428.0" y="277.4" text-anchor="middle" fill="#111827" font-size="12">0.96×</text>
<text x="428.0" y="484" text-anchor="middle" fill="#111827" font-size="12">threads-50</text>
<rect x="554.0" y="285.3" width="116" height="172.7" rx="3" fill="#94A3B8"/>
<text x="612.0" y="277.3" text-anchor="middle" fill="#111827" font-size="12">0.96×</text>
<text x="612.0" y="484" text-anchor="middle" fill="#111827" font-size="12">threads-100</text>
<rect x="738.0" y="285.1" width="116" height="172.9" rx="3" fill="#64748B"/>
<text x="796.0" y="277.1" text-anchor="middle" fill="#111827" font-size="12">0.96×</text>
<text x="796.0" y="484" text-anchor="middle" fill="#111827" font-size="12">threads-200</text>
    <rect x="976" y="166" width="256" height="392" rx="22" class="card"/><rect x="976" y="166" width="6" height="392" rx="3" fill="#DC2626" opacity="0.95"/>
    <text x="1006" y="210" class="kicker">TAKEAWAY</text>
    <text x="1006" y="252" class="h2">等待交给协程</text>
    <text x="1006" y="284" class="h2">计算交给并行</text>
    <circle cx="1006" cy="337" r="4.5" fill="#F87171"/>
<text x="1024" y="342" class="body" text-anchor="start">移出事件循环</text>
<circle cx="1006" cy="371" r="4.5" fill="#F87171"/>
<text x="1024" y="376" class="body" text-anchor="start">进程池/原生扩展</text>
<circle cx="1006" cy="405" r="4.5" fill="#F87171"/>
<text x="1024" y="410" class="body" text-anchor="start">向量化/SIMD/GPU</text>
<circle cx="1006" cy="439" r="4.5" fill="#F87171"/>
<text x="1024" y="444" class="body" text-anchor="start">别把协程当算力</text>

  </g>
  <text x="1232" y="692" text-anchor="end" class="small">17/20</text>
</svg>
