<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720" role="img" aria-label="I/O结果：线程池更快，但用线程换速度">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1020"/>
      <stop offset="55%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#172033"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <style>
      .page { font-family: "Microsoft YaHei", "Microsoft YaHei UI", "DengXian", "SimSun", "NSimSun", "Segoe UI", Arial, sans-serif; }
      .card { fill: rgba(255,255,255,0.078); stroke: rgba(255,255,255,0.15); stroke-width: 1.1; }
      .card2 { fill: rgba(255,255,255,0.112); stroke: rgba(255,255,255,0.20); stroke-width: 1.1; }
      .chartcard { fill: rgba(248,250,252,0.97); stroke: rgba(255,255,255,0.12); stroke-width: 1.1; }
      .kicker { fill: #93C5FD; font-size: 14.5px; font-weight: 850; letter-spacing: 1.7px; }
      .title { fill: #F8FAFC; font-size: 39px; font-weight: 850; letter-spacing: 0; }
      .h1 { fill: #F8FAFC; font-size: 52px; font-weight: 850; letter-spacing: 0; }
      .h2 { fill: #F8FAFC; font-size: 24px; font-weight: 820; letter-spacing: 0; }
      .h3 { fill: #E5E7EB; font-size: 19.5px; font-weight: 780; letter-spacing: 0; }
      .body { fill: #CBD5E1; font-size: 16.8px; font-weight: 540; letter-spacing: 0; }
      .body2 { fill: #E2E8F0; font-size: 19.2px; font-weight: 620; letter-spacing: 0; }
      .small { fill: #94A3B8; font-size: 13.5px; font-weight: 520; letter-spacing: 0; }
      .metric { fill: #F8FAFC; font-size: 44px; font-weight: 850; letter-spacing: 0; }
      .axis { stroke: rgba(255,255,255,0.22); stroke-width: 1; }
      .node { fill: rgba(15,23,42,0.75); stroke: rgba(255,255,255,0.18); stroke-width: 1.1; }
      .line { fill: none; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>
  <rect class="page" width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1126" cy="-88" r="282" fill="#2563EB" opacity="0.12"/>
  <circle cx="-86" cy="650" r="310" fill="#059669" opacity="0.10"/>
  <g class="page">
    <text x="50" y="52" class="kicker" text-anchor="start">I/O RESULT</text>
    <text x="50" y="96" class="title" text-anchor="start">I/O结果：线程池更快，但用线程换速度</text>
    <text x="50" y="128" class="body" text-anchor="start">asyncio用0个业务新增线程稳定承载5000个TCP请求；threads-200更快，但新增约200个线程。</text>

    <rect x="48" y="166" width="900" height="392" rx="22" class="chartcard"/>
    <text x="126" y="222" fill="#111827" font-size="21" font-weight="850">5000 TCP requests: thread pool buys speed with threads</text>
<line x1="162" y1="458" x2="888" y2="458" stroke="#111827" stroke-width="1.2"/>
<line x1="162" y1="260" x2="162" y2="458" stroke="#111827" stroke-width="1.2"/>
<text x="92" y="416" transform="rotate(-90 92 416)" fill="#111827" font-size="14">Peak extra Python threads</text>
<line x1="162" y1="458.0" x2="888" y2="458.0" stroke="#E5E7EB" stroke-width="1"/>
<text x="150" y="463.0" text-anchor="end" fill="#111827" font-size="12">0</text>
<line x1="162" y1="413.0" x2="888" y2="413.0" stroke="#E5E7EB" stroke-width="1"/>
<text x="150" y="418.0" text-anchor="end" fill="#111827" font-size="12">50</text>
<line x1="162" y1="368.0" x2="888" y2="368.0" stroke="#E5E7EB" stroke-width="1"/>
<text x="150" y="373.0" text-anchor="end" fill="#111827" font-size="12">100</text>
<line x1="162" y1="323.0" x2="888" y2="323.0" stroke="#E5E7EB" stroke-width="1"/>
<text x="150" y="328.0" text-anchor="end" fill="#111827" font-size="12">150</text>
<line x1="162" y1="278.0" x2="888" y2="278.0" stroke="#E5E7EB" stroke-width="1"/>
<text x="150" y="283.0" text-anchor="end" fill="#111827" font-size="12">200</text>
<rect x="196.8" y="458.0" width="112" height="0.0" rx="3" fill="#2563EB"/>
<text x="252.8" y="450.0" text-anchor="middle" fill="#111827" font-size="12">0</text>
<text x="252.8" y="484" text-anchor="middle" fill="#111827" font-size="12">asyncio</text>
<rect x="378.2" y="413.0" width="112" height="45.0" rx="3" fill="#CBD5E1"/>
<text x="434.2" y="405.0" text-anchor="middle" fill="#111827" font-size="12">50</text>
<text x="434.2" y="484" text-anchor="middle" fill="#111827" font-size="12">threads-50</text>
<rect x="559.8" y="368.0" width="112" height="90.0" rx="3" fill="#94A3B8"/>
<text x="615.8" y="360.0" text-anchor="middle" fill="#111827" font-size="12">100</text>
<text x="615.8" y="484" text-anchor="middle" fill="#111827" font-size="12">threads-100</text>
<rect x="741.2" y="278.0" width="112" height="180.0" rx="3" fill="#64748B"/>
<text x="797.2" y="270.0" text-anchor="middle" fill="#111827" font-size="12">200</text>
<text x="797.2" y="484" text-anchor="middle" fill="#111827" font-size="12">threads-200</text>
    <rect x="976" y="166" width="256" height="392" rx="22" class="card"/><rect x="976" y="166" width="6" height="392" rx="3" fill="#2563EB" opacity="0.95"/>
    <text x="1006" y="210" class="kicker">KEY DATA</text>
    <text x="1006" y="262" class="metric">0 vs 200</text>
    <text x="1006" y="296" class="body">业务新增线程</text>
    <line x1="1006" y1="326" x2="1190" y2="326" class="axis"/>
    <text x="1006" y="370" class="h2">4.81s</text>
    <text x="1092" y="370" class="body">asyncio</text>
    <text x="1006" y="414" class="h2">1.62s</text>
    <text x="1092" y="414" class="body">threads-200</text>
    <text x="1006" y="476" class="small">线程池用更多线程换低延迟；</text>
    <text x="1006" y="502" class="small">协程在低线程成本下承载并发。</text>

  </g>
  <text x="1232" y="692" text-anchor="end" class="small">15/20</text>
</svg>
