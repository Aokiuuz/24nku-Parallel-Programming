  <g class="page">
    <text x="50" y="52" class="kicker" text-anchor="start">FINAL TAKEAWAY</text>
    <text x="50" y="96" class="title" text-anchor="start">总结：协程是等待任务的调度抽象，CPU计算依赖并行方案</text>
    <text x="50" y="128" class="body" text-anchor="start">PPT讲结论链路，PDF保留完整调研、实验方法、数据解释、局限性与参考资料。</text>

    <rect x="48" y="158" width="376" height="426" rx="0" class="card2"/><rect x="48" y="158" width="6" height="426" rx="3" fill="#002FA7" opacity="0.95"/>
    <text x="82" y="208" class="kicker">WHAT WE PROVED</text>
    <text x="82" y="250" class="h2">实验结论</text>
    <circle cx="82" cy="295" r="4.5" fill="#002FA7"/>
<text x="100" y="300" class="body" text-anchor="start">本地 TCP I/O：asyncio 新增业务线程为 0</text>
<circle cx="82" cy="326" r="4.5" fill="#002FA7"/>
<text x="100" y="331" class="body" text-anchor="start">threads-200 用约 200 线程换取更低耗时</text>
<circle cx="82" cy="357" r="4.5" fill="#002FA7"/>
<text x="100" y="362" class="body" text-anchor="start">CPU-bound：归一化耗时接近，协程不创造算力</text>
<circle cx="82" cy="388" r="4.5" fill="#002FA7"/>
<text x="100" y="393" class="body" text-anchor="start">主读 median，PDF 保留 mean/min/max</text>
    <rect x="456" y="158" width="376" height="426" rx="0" class="card"/><rect x="456" y="158" width="6" height="426" rx="3" fill="#002FA7" opacity="0.95"/>
    <text x="490" y="208" class="kicker">WHAT IT MEANS</text>
    <text x="490" y="250" class="h2">工程判断</text>
    <circle cx="490" cy="295" r="4.5" fill="#002FA7"/>
<text x="508" y="300" class="body" text-anchor="start">I/O 等待多：优先考虑协程/异步I/O</text>
<circle cx="490" cy="326" r="4.5" fill="#002FA7"/>
<text x="508" y="331" class="body" text-anchor="start">阻塞库多：先处理同步调用和连接池</text>
<circle cx="490" cy="357" r="4.5" fill="#002FA7"/>
<text x="508" y="362" class="body" text-anchor="start">CPU 密集：进程池、原生扩展或向量化</text>
<circle cx="490" cy="388" r="4.5" fill="#002FA7"/>
<text x="508" y="393" class="body" text-anchor="start">任何模型都不能替代限流、超时和取消</text>
