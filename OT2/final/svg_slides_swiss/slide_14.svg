  <g class="page">
    <text x="50" y="52" class="kicker" text-anchor="start">METRICS</text>
    <text x="50" y="96" class="title" text-anchor="start">实验指标解释：主读中位数，补充看均值和范围</text>
    <text x="50" y="128" class="body" text-anchor="start">指标口径先讲清楚，实验结论才不会被误读。</text>

    <rect x="48" y="166" width="370" height="392" rx="0" class="card2"/><rect x="48" y="166" width="6" height="392" rx="3" fill="#002FA7" opacity="0.95"/>
    <text x="82" y="210" class="kicker">TIME</text><text x="82" y="252" class="h2">中位耗时</text><circle cx="82" cy="301" r="4.5" fill="#002FA7"/>
<text x="100" y="306" class="body" text-anchor="start">每组重复5次</text>
<circle cx="82" cy="335" r="4.5" fill="#002FA7"/>
<text x="100" y="340" class="body" text-anchor="start">主读median，降低偶然波动</text>
<circle cx="82" cy="369" r="4.5" fill="#002FA7"/>
<text x="100" y="374" class="body" text-anchor="start">PDF保留mean/min/max</text>
    <rect x="456" y="166" width="370" height="392" rx="0" class="card"/><rect x="456" y="166" width="6" height="392" rx="3" fill="#002FA7" opacity="0.95"/>
    <text x="490" y="210" class="kicker">RESOURCE</text><text x="490" y="252" class="h2">业务新增线程 + RSS增量</text><circle cx="490" cy="301" r="4.5" fill="#002FA7"/>
<text x="508" y="306" class="body" text-anchor="start">线程数扣除server和sampler基线</text>
<circle cx="490" cy="335" r="4.5" fill="#002FA7"/>
<text x="508" y="340" class="body" text-anchor="start">RSS来自psutil采样</text>
<circle cx="490" cy="369" r="4.5" fill="#002FA7"/>
<text x="508" y="374" class="body" text-anchor="start">tracemalloc仅作为补充</text>
    <rect x="864" y="166" width="368" height="392" rx="0" class="card"/><rect x="864" y="166" width="6" height="392" rx="3" fill="#002FA7" opacity="0.95"/>
    <text x="898" y="210" class="kicker">LIMITATION</text><text x="898" y="252" class="h2">实验边界</text><circle cx="898" cy="301" r="4.5" fill="#002FA7"/>
<text x="916" y="306" class="body" text-anchor="start">loopback不等于公网生产环境</text>
<circle cx="898" cy="335" r="4.5" fill="#002FA7"/>
<text x="916" y="340" class="body" text-anchor="start">Python结果不能直接推广到Go/Java/C++</text>
<circle cx="898" cy="369" r="4.5" fill="#002FA7"/>
<text x="916" y="374" class="body" text-anchor="start">CPU实验受GIL影响</text>
<circle cx="898" cy="403" r="4.5" fill="#002FA7"/>
<text x="916" y="408" class="body" text-anchor="start">结论聚焦模型边界</text>

